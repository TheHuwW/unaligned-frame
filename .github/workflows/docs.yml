name: Deploy Sphinx Docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Already v4, keeping for now

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install sphinx sphinx-rtd-theme

      - name: Build Sphinx HTML
        # Adjust 'docs' if your folder name is different
        run: sphinx-build -b html docs/ _build/html

      - name: Setup Pages
        uses: actions/configure-pages@v5 # Upgraded to v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This must match your build output directory above
          path: '_build/html'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4